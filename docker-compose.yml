services:
  postgres:
    image: postgres:16
    container_name: desafio_mirante_postgres
    environment:
      POSTGRES_DB: modernization
      POSTGRES_USER: modernization
      POSTGRES_PASSWORD: modernization
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modernization -d modernization"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

